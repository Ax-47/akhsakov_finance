[package]
name = "api"
version = "0.1.0"
edition = "2021"

[dependencies]
dioxus = { workspace = true, features = ["fullstack"] }
types = { workspace = true }
dtos = { workspace = true }
serde = { workspace = true, version = "1.0.228", features = ["derive"] }
serde_json = { workspace = true, version = "1.0" }
uuid = { workspace = true, version = "1.23.2", features = ["v4", "serde"]  }
rust_decimal = { version = "1", features = ["serde"]  }
chrono = { version = "0.4.45", features = ["serde"] }
rust_decimal_macros = "1"
reqwest = { workspace = true, version = "0.13", features =  ["json", "cookies"] , optional = true }
futures = {workspace = true,version="0.3", optional = true }
tokio = { workspace = true,version = "1", features = ["full"] , optional = true }
tokio-stream = {workspace = true,version="0.1", optional = true }
once_cell = {workspace = true,version="1", optional = true }
tokio-tungstenite = {workspace = true,version="0.29.0", optional = true }
tungstenite = {workspace = true,version="0.29.0", optional = true }
thiserror = { workspace = true, version = "2.0.18"  }
yfinance-rs ={ workspace = true, version ="0.9.0", features = ["stream"], optional = true }
async-trait ={ workspace = true, version ="0.1.89", optional = true }
tracing = {workspace = true, version ="0.1.44", optional = true }
[features]
server = ["dioxus/server","dep:tokio","dep:yfinance-rs","dep:async-trait","dep:tungstenite","dep:tokio-tungstenite","dep:once_cell","dep:tokio-stream","dep:futures","dep:reqwest","dep:tracing"]
